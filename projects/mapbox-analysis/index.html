	<!-- <script src="../../site/js/plugins.js"></script> -->
	<script>
		// TO ADD
		// North-Up and reset pitch and bearing button
		// Terrain
		// Globe
		// Population Density
		// Counties, Towns, Etc
		// Street Hover Data
		// Mapillary Hover Data
		// Directions
		// Traffic
		// 3D Buildings
		// Measure Distances

		let preloadMODE = 'none'; // 'none', 'page', 'map'
		let searchMODE = true; // Show Search Bar
		let threeDMODE = true; // 3D Mode
		let projectionMODE = 'mercator'; // 'mercator' 'albers' 'naturalEarth' 'globe' // Map Projection (theeDMODE must be on for Globe)
		let hashMODE = false; // Update URL
		let exaggeration = 1.5; // 3D Terrain Exaggeration [1.5 Default]

		// Define Styles
		const Mapbox_Streets = [0, 'Street', 'mapbox://styles/mapbox/streets-v11'];
		const Mapbox_Outdoors = [1, 'Outdoors', 'mapbox://styles/mapbox/outdoors-v11'];
		const Mapbox_Light = [2, 'Light', 'mapbox://styles/mapbox/light-v10'];
		const Mapbox_Dark = [3, 'Dark', 'mapbox://styles/mapbox/dark-v10'];
		const Mapbox_Satellite_Streets = [5, 'Satellite', 'mapbox://styles/mapbox/satellite-streets-v11'];
		const Layered_Satellite_Less_Labels = [11, 'Satellite (Reduced Labels)', 'mapbox://styles/mapbox-map-design/ckhqrf2tz0dt119ny6azh975y'];
		const Mapbox_Satellite = [4, 'Satellite (Clear)', 'mapbox://styles/mapbox/satellite-v9'];
		const Layered_Outdoors_Hillshading = [10, 'Terrain', 'mapbox://styles/mapbox/cjaudgl840gn32rnrepcb9b9g'];
		const Mapbox_Navigation_Day = [6, 'Navigation', 'mapbox://styles/mapbox/navigation-day-v1'];
		const Mapbox_Navigation_Night = [7, 'Navigation (Night)', 'mapbox://styles/mapbox/navigation-night-v1'];
		const Moonlight = [8, 'Moonlight', 'mapbox://styles/antadam127/cl4yfem29005b15p9ltlrd9oy', 'night'];
		const Moonlight_No_Labels = [9, 'Moonlight (Clear)', 'mapbox://styles/antadam127/cl4yjh0sd000115mnv3lowqwo'];

		const allMapStyles = [Mapbox_Streets, Mapbox_Outdoors, Mapbox_Light, Mapbox_Dark, Mapbox_Satellite, Mapbox_Satellite_Streets, Mapbox_Navigation_Day, Mapbox_Navigation_Night, Moonlight, Moonlight_No_Labels, Layered_Outdoors_Hillshading,
			Layered_Satellite_Less_Labels
		];

		// Set Style
		const startingStyle = Mapbox_Streets; // Starting Style
		const styleOptions = [0, 2, 10, 11, 8]; //[0, 1, 2, 3, 5, 11, 4, 10, 6, 7, 8, 9]; // Radio Button Options Indices;
		let currentStyle = startingStyle;

		// Create Map
		mapboxgl.accessToken = 'pk.eyJ1IjoiYW50YWRhbTEyNyIsImEiOiJjbDI2ZGJnN2wyaW5qM2JxZHVmZTJjNm8zIn0.4aMtEeYWx4hxIVKRrqsqWw';
		const map = new mapboxgl.Map({
			container: 'map', // container ID
			style: startingStyle[2], // style URL
			center: [-96, 38.5], // starting position [lng, lat]
			zoom: 4, // starting zoom
			projection: !threeDMODE && projectionMODE == 'globe' ? projectionMODE = 'mercator' : projectionMODE, // Map Projection
			hash: hashMODE, // Update URL
			dragRotate: threeDMODE, // Allow rotation
			// scrollZoom: false, // Allow map zoom
		});

		// // Page Loader
		// if (preloadMODE == 'map') {
		// 	map.on('load', (e) => {
		// 		$('body').addClass('loaded');
		// 	});
		// } else if (preloadMODE != 'page') {
		// 	// document.getElementById("loader-wrapper").style.visibility = "hidden";
		// }

		// Map Load
		map.on('load', () => {
			resetMap();
		});

		// Style Load
		map.on('style.load', (e) => {

			// DATA //
			map.addSource('alumni', {
				type: 'geojson',
				data: 'data/linkedin_psu_alumni_dataset.geojson'
			});

			// Add a layer showing the places.
			map.addLayer({
				'id': 'places',
				'type': 'circle',
				'source': 'alumni',
				'paint': {
					'circle-color': '#4264fb',
					'circle-radius': 4,
					'circle-stroke-width': 1,
					'circle-stroke-color': '#ffffff'
				}
			});
			// DATA END //

			if (threeDMODE) {
				map.addSource('mapbox-dem', {
					'type': 'raster-dem',
					'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
					'tileSize': 512,
					'maxzoom': 14
				});
				// add the DEM source as a terrain layer with exaggerated height
				map.setTerrain({
					'source': 'mapbox-dem',
					'exaggeration': exaggeration // 1.5 Default
				});

				// Set Fog
				const fp = fogProperties[currentStyle[3] ? currentStyle[3] : 'standard'];
				map.setFog(fp);

			} else {
				resetAngles();
			}

			if (currentStyle == Layered_Outdoors_Hillshading) {
				map.addSource('dem', {
					'type': 'raster-dem',
					'url': 'mapbox://mapbox.mapbox-terrain-dem-v1'
				});
				map.addLayer({
						'id': 'hillshading',
						'source': 'dem',
						'type': 'hillshade'
						// insert below waterway-river-canal-shadow;
						// where hillshading sits in the Mapbox Outdoors style
					},
					'waterway-river-canal-shadow'
				);
			}

		});

		// Add Search Bar
		if (searchMODE) {
			map.addControl(
				new MapboxGeocoder({
					accessToken: mapboxgl.accessToken,
					mapboxgl: mapboxgl,
				})
			);
		}

		// Create Radio Buttons
		if (styleOptions.length > 0) {
			let menu = document.createElement('div');
			menu.id = 'stylemenu';
			for (const i of styleOptions) {
				let item = document.createElement('input');
				item.id = allMapStyles[i][2];
				item.type = 'radio';
				item.name = 'rtoggle';
				item.checked = allMapStyles[i] == startingStyle ? true : false;
				item.onclick = () => {
					// currentStyle =
					if (allMapStyles[i] != currentStyle) {
						currentStyle = allMapStyles[i];
						map.setStyle(allMapStyles[i][2]);
					}
				}
				menu.appendChild(item);
				let label = document.createElement('label');
				label.setAttribute('for', allMapStyles[i][2]);
				label.innerHTML = ' ' + allMapStyles[i][1] + ' ';
				menu.appendChild(label);
			}
			document.body.appendChild(menu);
		}

		// Create a popup, but don't add it to the map yet.
		const popup = new mapboxgl.Popup({
			closeButton: false,
			closeOnClick: false
		});

		map.on('mouseenter', 'alumni', (e) => {
			// Change the cursor style as a UI indicator.
			map.getCanvas().style.cursor = 'pointer';

			// Copy coordinates array.
			const coordinates = e.features[0].geometry.coordinates.slice();
			const description = e.features[0].properties.jobTitle;

			// Ensure that if the map is zoomed out such that multiple
			// copies of the feature are visible, the popup appears
			// over the copy being pointed to.
			while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
				coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
			}

			// Populate the popup and set its coordinates
			// based on the feature found.
			popup.setLngLat(coordinates).setHTML(description).addTo(map);
		});

		map.on('mouseleave', 'alumni', () => {
			map.getCanvas().style.cursor = '';
			popup.remove();
		});

		// Map On Click
		map.on('click', (e) => {
			e.preventDefault();
			resetMap();
		});

		// Reset Map
		function resetMap() {
			map.flyTo({
				// center: [-96, 38.5],
				// zoom: 4,
				// bearing: 0
				// pitch: 0,
				center: [-76.312, 20.8],
				zoom: 6,
				bearing: 20.8,
				pitch: 38.5
			});
		}
		// Reset Angles
		function resetAngles() {
			map.jumpTo({
				pitch: 0,
				bearing: 0
			})
		}

		// Define Fog Properties
		fogProperties = {
			standard: {},
			day: {
				'horizon-blend': 0.3,
				'color': '#f8f0e3',
				'high-color': '#add8e6',
				'space-color': '#d8f2ff',
				'star-intensity': 0.0
			},
			sunset: {
				"range": [0.8, 8],
				"color": "#dc9f9f",
				"horizon-blend": 0.5,
				"high-color": "#245bde",
				"space-color": "#000000",
				"star-intensity": 0.15
			},
			night: {
				'range': [-1, 2],
				'horizon-blend': 0.3,
				'color': '#242B4B',
				'high-color': '#161B36',
				'space-color': '#0B1026',
				'star-intensity': 0.8
			},
			heavyFog: {
				'range': [-1, 2],
				'horizon-blend': 0.3,
				'color': 'white',
				'high-color': '#add8e6',
				'space-color': '#d8f2ff',
				'star-intensity': 0.0
			},
			space: {
				color: 'rgb(186, 210, 235)', // Lower atmosphere
				'high-color': 'rgb(36, 92, 223)', // Upper atmosphere
				'horizon-blend': 0.02, // Atmosphere thickness (default 0.2 at low zooms)
				'space-color': 'rgb(11, 11, 25)', // Background color
				'star-intensity': 0.6 // Background star brightness (default 0.35 at low zoooms )
			}
		}

		// // Set up Loader
		// if (preloadMODE == 'page') {
		// 	$(window).on("load", function() {
		// 		$('body').addClass('loaded');
		// 	});
		// }
	</script>
